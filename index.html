<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Foldcraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          geist: ['Geist', 'sans-serif'],
        },
      },
    },
  };
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up-1 { animation: fadeSlideUp 0.8s ease 0.2s both; }
  .fade-up-2 { animation: fadeSlideUp 0.8s ease 0.4s both; }
  .fade-up-3 { animation: fadeSlideUp 0.8s ease 0.7s both; }
  .fade-up-4 { animation: fadeSlideUp 0.8s ease 0.9s both; }

  .mobile-menu-panel {
    transition: height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.5s cubic-bezier(0.16,1,0.3,1);
    height: 0;
    opacity: 0;
    pointer-events: none;
  }
  .mobile-menu-panel.open {
    height: 100vh;
    opacity: 1;
    pointer-events: auto;
  }
  .mobile-menu-inner {
    transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s, transform 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s;
    opacity: 0;
    transform: translateY(32px);
  }
  .mobile-menu-panel.open .mobile-menu-inner {
    opacity: 1;
    transform: translateY(0);
  }

  #menuIconOpen, #menuIconClose {
    transition: all 0.3s ease;
  }
  #menuIconClose { opacity: 0; transform: rotate(-90deg) scale(0.5); }
  #menuBtn.open #menuIconOpen { opacity: 0; transform: rotate(90deg) scale(0.5); }
  #menuBtn.open #menuIconClose { opacity: 1; transform: rotate(0deg) scale(1); }
</style>
</head>
<body class="font-geist">

  <div class="relative h-screen w-full overflow-hidden bg-black font-geist">

    <!-- VIDEO BACKGROUND -->
    <video
      class="absolute w-full h-full object-cover"
      style="object-position: 70% center;"
      autoplay
      muted
      loop
      playsinline
      src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260622_204221_5339e40b-e73d-4ab0-9c65-79c18c66fd50.mp4"
    ></video>

    <!-- NAVBAR -->
    <nav class="relative z-30 flex items-center justify-between px-6 py-5 md:px-12 lg:px-16">
      <div class="flex items-center gap-10">
        <span class="text-lg font-semibold tracking-tight text-white sm:text-xl">Foldcraft</span>
        <div class="hidden md:flex items-center gap-8">
          <a href="#" class="text-sm text-white/80 hover:text-white transition-colors">Home</a>
          <a href="#" class="text-sm text-white/80 hover:text-white transition-colors">Projects</a>
          <a href="#" class="text-sm text-white/80 hover:text-white transition-colors">Studio</a>
          <a href="#" class="text-sm text-white/80 hover:text-white transition-colors">Reach Us</a>
        </div>
      </div>

      <div class="hidden md:block">
        <button class="rounded-lg bg-white px-5 py-2 text-sm font-medium text-black hover:scale-105 transition-transform">
          Let's Talk
        </button>
      </div>

      <button id="menuBtn" onclick="toggleMenu()" class="md:hidden relative h-10 w-10 z-50 active:scale-90 transition-transform" aria-label="Toggle menu">
        <svg id="menuIconOpen" class="absolute inset-0 m-auto text-white" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="20" y2="18"></line></svg>
        <svg id="menuIconClose" class="absolute inset-0 m-auto text-white" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobileMenu" class="mobile-menu-panel absolute inset-x-0 top-0 z-20 overflow-hidden bg-black/98 backdrop-blur-xl">
      <div class="mobile-menu-inner flex h-full flex-col justify-center px-8">
        <a href="#" onclick="closeMenu()" class="text-3xl font-medium text-white/90 hover:text-white py-2">Home</a>
        <a href="#" onclick="closeMenu()" class="text-3xl font-medium text-white/90 hover:text-white py-2">Projects</a>
        <a href="#" onclick="closeMenu()" class="text-3xl font-medium text-white/90 hover:text-white py-2">Studio</a>
        <a href="#" onclick="closeMenu()" class="text-3xl font-medium text-white/90 hover:text-white py-2">Reach Us</a>
        <button onclick="closeMenu()" class="mt-6 w-fit rounded-full bg-white px-8 py-3.5 text-base font-medium text-black hover:scale-105 transition-transform">
          Let's Talk
        </button>
      </div>
    </div>

    <!-- HERO CONTENT -->
    <div class="relative z-10 flex h-[calc(100vh-80px)] flex-col justify-between px-6 pb-10 pt-12 sm:pb-12 sm:pt-16 md:px-12 md:pb-16 md:pt-20 lg:px-16">

      <div class="max-w-3xl">
        <div class="fade-up-1 mb-4 sm:mb-6 text-xs sm:text-sm text-white/90">
          Brand &amp; Visual Storytelling
        </div>
        <h1 class="fade-up-2 text-3xl sm:text-5xl md:text-6xl lg:text-7xl font-medium leading-[1.1] tracking-tight text-white">
          Shaping visual<br />
          narratives,<br />
          one pixel at a time.
        </h1>
      </div>

      <div>
        <p class="fade-up-3 text-sm sm:text-base md:text-lg leading-relaxed text-white/60 max-w-sm sm:max-w-lg mb-5 sm:mb-6">
          Turning vision into reality through craft, motion, and an endless pursuit of beauty.
        </p>
        <button class="fade-up-4 rounded-lg bg-white px-5 py-2.5 sm:px-6 sm:py-3 text-sm font-medium text-black hover:scale-105 transition-transform inline-flex items-center gap-2">
          Explore Work
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>

    </div>

  </div>

  <script>
    lucide.createIcons();

    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    function toggleMenu() {
      const isOpen = mobileMenu.classList.toggle('open');
      menuBtn.classList.toggle('open', isOpen);
    }
    function closeMenu() {
      mobileMenu.classList.remove('open');
      menuBtn.classList.remove('open');
    }
  </script>
</body>
</html>
